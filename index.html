<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Master | Beauty Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; padding-bottom: 80px; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.2rem; color: #d4af37; margin: 0; }
        
        /* Menu de Abas */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; background: #111; padding: 5px; border-radius: 12px; }
        .tab-btn { flex: 1; background: none; border: none; color: #666; padding: 10px; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.8rem; transition: 0.3s; }
        .tab-btn.active { background: #d4af37; color: #000; }

        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .filters { margin-bottom: 20px; }
        label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        input, select { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px; }

        .agenda-list, .mgmt-list { display: flex; flex-direction: column; gap: 12px; }
        .agenda-item, .mgmt-item { 
            background: #161616; padding: 18px; border-radius: 15px; 
            border-left: 5px solid #d4af37; display: flex; justify-content: space-between; align-items: center;
        }

        .client-info b { font-size: 1.1rem; display: block; color: #fff; }
        .client-info span { font-size: 0.85rem; color: #d4af37; font-weight: 600; margin-right: 10px; }
        .client-info small { display: block; color: #888; margin-top: 4px; font-size: 0.8rem; }
        
        .btn-add { background: #d4af37; color: #000; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 20px; }
        .btn-del { background: #333; border: none; color: #ff4444; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #444; border: none; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-right: 5px; }

        .notif { position: fixed; top: 20px; right: 20px; background: #d4af37; color: #000; padding: 15px 25px; border-radius: 12px; font-weight: bold; z-index: 999; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Admin Beauty Studio</h1>
        <button onclick="bloqueioManual()" style="background:none; border: 1px solid #333; color:#888; padding: 5px 10px; border-radius: 6px; cursor:pointer; font-size: 0.7rem;">Bloquear Horário</button>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'sec-agenda')">Agenda</button>
        <button class="tab-btn" onclick="openTab(event, 'sec-equipe')">Equipe</button>
        <button class="tab-btn" onclick="openTab(event, 'sec-servicos')">Serviços</button>
    </div>

    <div id="sec-agenda" class="section active">
        <div class="filters">
            <label>Ver agenda de:</label>
            <input type="date" id="filtroData" onchange="listarAgendamentos()">
        </div>
        <div id="listaAgendamentos" class="agenda-list"></div>
    </div>

    <div id="sec-equipe" class="section">
        <button class="btn-add" onclick="adicionarEquipe()">+ Novo Barbeiro</button>
        <div id="listaEquipe" class="mgmt-list"></div>
    </div>

    <div id="sec-servicos" class="section">
        <button class="btn-add" onclick="adicionarServico()">+ Novo Serviço/Produto</button>
        <div id="listaServicos" class="mgmt-list"></div>
    </div>
</div>

<script>
    const SUPABASE_URL = 'https://tgtqrhjutligkgthcrvq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LKBQ9OjGQ3JazqKKaM0MYw_dL1lKIYr';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const somNotificacao = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

    document.getElementById('filtroData').valueAsDate = new Date();

    function openTab(evt, sectionName) {
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(sectionName).classList.add('active');
        evt.currentTarget.classList.add('active');
        
        if(sectionName === 'sec-equipe') listarEquipe();
        if(sectionName === 'sec-servicos') listarServicos();
    }

    async function listarAgendamentos() {
        const dataBusca = document.getElementById('filtroData').value;
        const { data, error } = await _supabase.from('agendamentos').select('*').eq('data', dataBusca).order('hora', { ascending: true });
        const container = document.getElementById('listaAgendamentos');
        container.innerHTML = data?.length ? "" : "<p style='text-align:center; color:#555;'>Vazio.</p>";
        data?.forEach(item => {
            const fone = item.telefone_cliente ? item.telefone_cliente.replace(/\D/g, '') : '';
            container.innerHTML += `
                <div class="agenda-item">
                    <div class="client-info">
                        <span>${item.hora}</span><b>${item.nome_cliente}</b>
                        <small>📍 ${item.barbeiro} | ✂️ ${item.servico}</small>
                    </div>
                    <div style="display:flex; gap:5px;">
                        <a href="https://wa.me/55${fone}" target="_blank" style="background:#25d366; padding:8px; border-radius:8px; text-decoration:none; font-size:0.7rem; color:#fff;">Zap</a>
                        <button class="btn-del" onclick="deletarAgendamento('${item.id}')">X</button>
                    </div>
                </div>`;
        });
    }

    async function deletarAgendamento(id) {
        if (confirm("Cancelar?")) { await _supabase.from('agendamentos').delete().eq('id', id); listarAgendamentos(); }
    }

    async function listarEquipe() {
        const { data } = await _supabase.from('equipe').select('*').order('nome');
        const container = document.getElementById('listaEquipe');
        container.innerHTML = "";
        data?.forEach(b => {
            container.innerHTML += `
                <div class="mgmt-item">
                    <div class="client-info"><b>${b.nome}</b><small>Barbeiro Profissional</small></div>
                    <button class="btn-del" onclick="removerEquipe('${b.id}')">Remover</button>
                </div>`;
        });
    }

    async function adicionarEquipe() {
        const nome = prompt("Nome do Barbeiro:");
        if(nome) { await _supabase.from('equipe').insert([{ nome }]); listarEquipe(); }
    }

    async function removerEquipe(id) {
        if(confirm("Remover da equipe?")) { await _supabase.from('equipe').delete().eq('id', id); listarEquipe(); }
    }

    async function listarServicos() {
        const { data } = await _supabase.from('servicos').select('*').order('nome');
        const container = document.getElementById('listaServicos');
        container.innerHTML = "";
        data?.forEach(s => {
            container.innerHTML += `
                <div class="mgmt-item">
                    <div class="client-info"><b>${s.nome}</b><small>Preço Base: R$ ${s.preco || '0,00'}</small></div>
                    <div style="display:flex;">
                        <button class="btn-edit" onclick="editarServico('${s.id}', '${s.nome}', '${s.preco}')">Editar</button>
                        <button class="btn-del" onclick="removerServico('${s.id}')">Remover</button>
                    </div>
                </div>`;
        });
    }

    async function adicionarServico() {
        const nome = prompt("Nome do Serviço (ex: Corte Degradê):");
        const preco = prompt("Preço (apenas números):");
        if(nome) { await _supabase.from('servicos').insert([{ nome, preco }]); listarServicos(); }
    }

    async function editarServico(id, nomeAtual, precoAtual) {
        const novoNome = prompt("Novo nome do serviço:", nomeAtual);
        const novoPreco = prompt("Novo preço:", precoAtual);
        if(novoNome && novoPreco) {
            await _supabase.from('servicos').update({ nome: novoNome, preco: novoPreco }).eq('id', id);
            listarServicos();
        }
    }

    async function removerServico(id) {
        if(confirm("Remover serviço?")) { await _supabase.from('servicos').delete().eq('id', id); listarServicos(); }
    }

    async function bloqueioManual() {
        const hora = prompt("Horário para bloquear:");
        const data = document.getElementById('filtroData').value;
        if(hora) { await _supabase.from('agendamentos').insert([{ data, hora, nome_cliente: 'BLOQUEADO', barbeiro: 'ADMIN', servico: 'INDISPONÍVEL' }]); listarAgendamentos(); }
    }

    _supabase.channel('changes').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agendamentos' }, payload => {
        somNotificacao.play();
        listarAgendamentos();
    }).subscribe();

    listarAgendamentos();
</script>
</body>
</html>
