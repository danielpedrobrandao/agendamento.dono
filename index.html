<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin | Beauty Studio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { background: #0a0a0a; color: #fff; font-family: 'Inter', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 600px; margin: 0 auto; }
        
        header { border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 25px; display: flex; justify-content: space-between; align-items: center; }
        h1 { font-size: 1.4rem; color: #d4af37; margin: 0; }
        
        .filters { margin-bottom: 20px; }
        label { font-size: 0.7rem; color: #666; text-transform: uppercase; letter-spacing: 1px; display: block; margin-bottom: 5px; }
        input[type="date"] { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 10px; width: 100%; box-sizing: border-box; font-size: 1rem; }

        .agenda-list { display: flex; flex-direction: column; gap: 12px; }
        .agenda-item { 
            background: #161616; padding: 18px; border-radius: 15px; 
            border-left: 5px solid #d4af37; display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .client-info b { font-size: 1.1rem; display: block; color: #fff; }
        .client-info span { font-size: 0.85rem; color: #d4af37; font-weight: 600; margin-right: 10px; }
        .client-info small { display: block; color: #888; margin-top: 4px; font-size: 0.8rem; }
        .price-tag { color: #25d366; font-weight: bold; font-size: 0.85rem; }

        .actions { display: flex; gap: 8px; }
        .btn-zap { background: #25d366; color: #fff; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 0.75rem; font-weight: bold; display: flex; align-items: center; transition: 0.3s; }
        .btn-zap:hover { background: #1eb954; }
        .btn-del { background: #333; border: none; color: #ff4444; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-del:hover { background: #ff4444; color: #fff; }

        /* Notificação flutuante */
        .notif { position: fixed; top: 20px; right: 20px; background: #d4af37; color: #000; padding: 15px 25px; border-radius: 12px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 999; animation: slideIn 0.5s ease-out; }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Painel Beauty Studio</h1>
        <button onclick="bloqueioManual()" style="background:none; border: 1px solid #333; color:#888; padding: 5px 10px; border-radius: 6px; cursor:pointer; font-size: 0.7rem;">Bloquear Horário</button>
    </header>

    <div class="filters">
        <label>Ver agenda de:</label>
        <input type="date" id="filtroData" onchange="listarAgendamentos()">
    </div>

    <div id="listaAgendamentos" class="agenda-list">
        </div>
</div>

<script>
    const SUPABASE_URL = 'https://tgtqrhjutligkgthcrvq.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LKBQ9OjGQ3JazqKKaM0MYw_dL1lKIYr';
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const somNotificacao = new Audio('https://assets.mixkit.co/active_storage/sfx/2354/2354-preview.mp3');

    // Inicializa com a data de hoje
    document.getElementById('filtroData').valueAsDate = new Date();

    async function listarAgendamentos() {
        const dataBusca = document.getElementById('filtroData').value;
        const listaContainer = document.getElementById('listaAgendamentos');
        listaContainer.innerHTML = "<p style='color:#444; text-align:center;'>Buscando...</p>";

        const { data, error } = await _supabase
            .from('agendamentos')
            .select('*')
            .eq('data', dataBusca)
            .order('hora', { ascending: true });

        if (error) {
            listaContainer.innerHTML = "<p>Erro ao carregar.</p>";
            return;
        }

        if (data.length === 0) {
            listaContainer.innerHTML = "<p style='text-align:center; color:#555; margin-top:30px;'>Nenhum cliente para este dia.</p>";
            return;
        }

        listaContainer.innerHTML = "";
        data.forEach(item => {
            const div = document.createElement('div');
            div.className = 'agenda-item';
            
            // Limpa o telefone para o link (remove parênteses, espaços e traços)
            const foneLimpo = item.telefone_cliente ? item.telefone_cliente.replace(/\D/g, '') : '';
            
            div.innerHTML = `
                <div class="client-info">
                    <span>${item.hora}</span>
                    <b>${item.nome_cliente}</b>
                    <small>📍 ${item.barbeiro || 'N/A'} | ✂️ ${item.servico || 'N/A'}</small>
                    <span class="price-tag">Custo: R$ 49,90</span>
                </div>
                <div class="actions">
                    ${item.telefone_cliente ? `
                        <a href="https://wa.me/55${foneLimpo}" target="_blank" class="btn-zap">
                            WhatsApp
                        </a>` : ''}
                    <button class="btn-del" onclick="deletarAgendamento('${item.id}')">X</button>
                </div>
            `;
            listaContainer.appendChild(div);
        });
    }

    async function deletarAgendamento(id) {
        if (confirm("Deseja realmente cancelar este agendamento?")) {
            await _supabase.from('agendamentos').delete().eq('id', id);
            listarAgendamentos();
        }
    }

    async function bloqueioManual() {
        const hora = prompt("Qual horário deseja bloquear? (Ex: 12:00)");
        const data = document.getElementById('filtroData').value;
        if(hora) {
            await _supabase.from('agendamentos').insert([
                { data, hora, nome_cliente: 'HORÁRIO BLOQUEADO', barbeiro: 'ADMIN', servico: 'MANUTENÇÃO' }
            ]);
            listarAgendamentos();
        }
    }

    // REALTIME: Escuta novos agendamentos e avisa o dono
    _supabase.channel('custom-insert-channel')
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'agendamentos' }, payload => {
        somNotificacao.play();
        const n = document.createElement('div');
        n.className = 'notif';
        n.innerHTML = `🔔 Novo Cliente: ${payload.new.nome_cliente}`;
        document.body.appendChild(n);
        setTimeout(() => n.remove(), 5000);
        listarAgendamentos();
    })
    .subscribe();

    // Carrega a lista inicial
    listarAgendamentos();
</script>

</body>
</html>
